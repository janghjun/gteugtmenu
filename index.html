<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>먹퀴즈</title>
    <meta name="description" content="유행 음식 맞히는 1분 퀴즈. 10문제로 내 트렌드 감각을 테스트해봐요." />

    <!-- Favicon: 라이트/다크 모드 대응 -->
    <link rel="icon" type="image/png" href="./assets/icons/icon-light.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="./assets/icons/icon-dark.png"  media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon"       href="./assets/icons/icon-light.png" />

    <!-- OG / SNS 공유 (og:image는 배포 후 절대경로로 교체 권장) -->
    <meta property="og:title"       content="먹퀴즈" />
    <meta property="og:description" content="유행 음식 맞히는 1분 퀴즈. 10문제로 내 트렌드 감각을 테스트해봐요." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://gteugtmenu-app.vercel.app" />
    <meta property="og:image"       content="https://gteugtmenu-app.vercel.app/assets/icons/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="514" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="먹퀴즈" />
    <meta name="twitter:description" content="유행 음식 맞히는 1분 퀴즈. 10문제로 내 트렌드 감각을 테스트해봐요." />
    <meta name="twitter:image"       content="https://gteugtmenu-app.vercel.app/assets/icons/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
